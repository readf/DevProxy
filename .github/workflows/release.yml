name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update Homebrew formula
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/${TAG}.tar.gz"

          # Download tarball and compute sha256
          curl -fsSL "$TARBALL_URL" -o release.tar.gz
          SHA256=$(shasum -a 256 release.tar.gz | awk '{print $1}')

          # Update formula in-place
          sed -i \
            -e "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/${TAG}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            Formula/devproxy.rb

          # Commit and push updated formula
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devproxy.rb
          git commit -m "chore: update Homebrew formula for ${TAG}"
          git push origin HEAD:main
